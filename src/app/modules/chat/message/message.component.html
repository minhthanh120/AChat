<div class="flex flex-col h-screen bg-[#f7f8fa]">
    <!-- Chat Header -->
    <div class="h-[60px] bg-white border-b border-[#e4e6ea] px-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-3 flex-1 min-w-0">
            <!-- Back button for mobile (optional) -->
            <button class="md:hidden w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>

            <!-- Avatar -->
            <div class="relative flex-shrink-0">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#3390ec] to-[#2481e0] flex items-center justify-center text-white font-semibold overflow-hidden">
                    <img src="https://flowbite.com/docs/images/people/profile-picture-5.jpg" alt="Avatar" class="w-full h-full object-cover">
                </div>
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-[#00c853] border-2 border-white rounded-full"></div>
            </div>

            <!-- User Info -->
            <div class="flex-1 min-w-0">
                <h1 class="text-[15px] font-semibold text-[#000000] truncate">Fullname</h1>
                <p class="text-xs text-[#707579] truncate">@username • online</p>
            </div>
        </div>

        <!-- Header Actions -->
        <div class="flex items-center gap-1">
            <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path>
                </svg>
            </button>
            <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 8v4M12 16h.01"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Messages Container -->
    <div
        #messagesContainer
        id="messages"
        class="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-thumb-blue scrollbar-thumb-rounded scrollbar-track-blue-lighter scrollbar-w-2">

        <div *ngIf="messages.length === 0" class="text-center text-sm text-[#707579] py-8">
            No messages yet.
        </div>

        <div
            *ngFor="let item of messages"
            class="flex items-end gap-2 max-w-[70%]"
            [class.ml-auto]="item.isMine">
            <div
                *ngIf="!item.isMine"
                class="w-8 h-8 rounded-full bg-gradient-to-br from-[#3390ec] to-[#2481e0] flex items-center justify-center text-white text-xs font-semibold flex-shrink-0">
                <span>{{ item.user?.charAt(0) || 'U' }}</span>
            </div>
            <div [class]="item.isMine ? 'message-bubble message-bubble-sent' : 'message-bubble message-bubble-received'">
                <p class="text-[15px] leading-relaxed whitespace-pre-wrap">{{ item.message }}</p>
                <div class="flex items-center justify-end gap-1 mt-1">
                    <span class="text-xs" [class]="item.isMine ? 'text-white/80' : 'text-[#707579]'">
                        {{ formatTime(item.createdAt) }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Message Input -->
    <div class="bg-white border-t border-[#e4e6ea] px-4 py-3">
        <div class="flex items-end gap-2">
            <!-- Attachment Button -->
            <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors flex-shrink-0 text-[#707579]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
                </svg>
            </button>

            <!-- Input Field -->
            <div class="flex-1 relative">
                <textarea 
                    #messageInput
                    [(ngModel)]="messageText"
                    (input)="onMessageInput()"
                    (keydown)="onMessageKeyDown($event)"
                    id="message" 
                    type="text" 
                    maxlength="4096"
                    rows="1"
                    placeholder="Type a message..."
                    class="w-full px-4 py-2.5 pr-12 bg-[#f0f2f5] border-0 rounded-[21px] resize-none focus:outline-none focus:bg-white focus:ring-2 focus:ring-[#3390ec] transition-all text-[15px] leading-relaxed scrollbar-thumb-blue scrollbar-thumb-rounded scrollbar-track-blue-lighter scrollbar-w-2"
                    style="min-height: 42px;"></textarea>
            </div>

            <!-- Emoji Button (optional) -->
            <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors flex-shrink-0 text-[#707579]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"></path>
                </svg>
            </button>

            <!-- Send Button -->
            <button 
                type="button" 
                id="send"
                [disabled]="!canSend" 
                (click)="sendMessage()"
                class="w-9 h-9 flex items-center justify-center rounded-full bg-[#3390ec] text-white hover:bg-[#2481e0] transition-colors flex-shrink-0 disabled:bg-gray-400 disabled:text-white/80 disabled:cursor-not-allowed disabled:hover:bg-gray-400">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>
