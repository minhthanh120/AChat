<div class="h-screen flex bg-[#f7f8fa]">
    <!-- Left Sidebar - Chat List -->
    <div class="w-[420px] bg-white border-r border-[#e4e6ea] flex flex-col h-screen">
        <!-- Header -->
        <div class="h-[60px] bg-white border-b border-[#e4e6ea] px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button 
                    type="button" 
                    (click)="openmenu()"
                    class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <ng-container *ngIf="isShow">
                    <app-menu></app-menu>
                </ng-container>
            </div>
            <button 
                type="button" 
                (click)="formAddGroup()"
                class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#f0f2f5] transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="16"></line>
                    <line x1="8" y1="12" x2="16" y2="12"></line>
                </svg>
            </button>
        </div>

        <!-- Search Bar -->
        <div class="px-4 py-3 border-b border-[#e4e6ea]">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-5 h-5 text-[#707579]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input 
                    (click)="openPopup()"
                    type="text" 
                    name="searchUser" 
                    id="searchUser" 
                    placeholder="Search" 
                    class="w-full pl-10 pr-4 py-2.5 text-[15px] bg-[#f0f2f5] border-0 rounded-lg focus:bg-white focus:ring-2 focus:ring-[#3390ec] focus:outline-none transition-all" />
            </div>
        </div>

        <!-- Chat List -->
        <app-recent></app-recent>
    </div>

    <!-- Right Side - Chat Window -->
    <div class="flex-1 flex flex-col bg-white">
        <router-outlet></router-outlet>
    </div>

    <!-- Modals -->
    <ng-container *ngIf="openAddGroup">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" (click)="formAddGroup()">
            <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4" (click)="$event.stopPropagation()">
                <app-addgroup></app-addgroup>
            </div>
        </div>
    </ng-container>
    
    <app-popup-messages></app-popup-messages>
</div>
