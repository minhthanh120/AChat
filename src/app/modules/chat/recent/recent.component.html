<div class="flex-1 overflow-y-auto scrollbar-thumb-blue scrollbar-thumb-rounded scrollbar-track-blue-lighter scrollbar-w-2">
    <!-- Spinner -->
    <div *ngIf="spinnerService.visibility | async" class="flex justify-center items-center py-8">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#3390ec]"></div>
    </div>

    <!-- Tabs -->
    <div class="flex justify-center py-2 border-b border-[#e4e6ea]">
        <div role="tablist" aria-label="tabs" class="relative flex items-center gap-1 px-1 bg-[#f0f2f5] rounded-lg">
            <div class="absolute indicator h-[30px] rounded-md bg-white shadow-sm" style="width: calc(33.333% - 4px);"></div>
            <button 
                role="tab" 
                aria-selected="true" 
                id="tab-1" 
                class="relative z-10 px-6 h-[30px] text-sm font-medium text-[#3390ec] transition-colors">
                All Chats
            </button>
            <button 
                role="tab" 
                aria-selected="false" 
                id="tab-2" 
                class="relative z-10 px-6 h-[30px] text-sm font-medium text-[#707579] transition-colors">
                Groups
            </button>
            <button 
                role="tab" 
                aria-selected="false" 
                id="tab-3" 
                class="relative z-10 px-6 h-[30px] text-sm font-medium text-[#707579] transition-colors">
                Contacts
            </button>
        </div>
    </div>

    <!-- Chat List -->
    <div class="flex flex-col">
        <ul class="divide-y divide-[#e4e6ea]">
            <!-- Chat Item -->
            <li 
                *ngFor="let chat of chats" 
                (click)="onSelect(chat.id)"
                class="flex items-center px-4 py-3 cursor-pointer hover:bg-[#f0f2f5] active:bg-[#e4e6ea] transition-colors">
                <!-- Avatar -->
                <div class="relative flex-shrink-0 mr-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#3390ec] to-[#2481e0] flex items-center justify-center text-white font-semibold text-base overflow-hidden">
                        <img *ngIf="chat.avatar" [src]="chat.avatar" [alt]="chat.name" class="w-full h-full object-cover">
                        <span *ngIf="!chat.avatar">{{ getInitials(chat.name) }}</span>
                    </div>
                    <!-- Online indicator -->
                    <div *ngIf="chat.isOnline" class="absolute bottom-0 right-0 w-3 h-3 bg-[#00c853] border-2 border-white rounded-full"></div>
                </div>

                <!-- Chat Info -->
                <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between mb-1">
                        <h3 class="text-[15px] font-medium text-[#000000] truncate">{{ chat.name }}</h3>
                        <span class="text-xs text-[#707579] ml-2 flex-shrink-0">{{ formatTime(chat.lastMessageTime) }}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <p class="text-sm text-[#707579] truncate flex-1">{{ chat.lastMessage }}</p>
                        <!-- Unread badge -->
                        <span *ngIf="chat.unreadCount && chat.unreadCount > 0" 
                            class="ml-2 px-1.5 py-0.5 bg-[#3390ec] text-white text-xs font-medium rounded-full min-w-[20px] text-center flex-shrink-0">
                            {{ chat.unreadCount > 99 ? '99+' : chat.unreadCount }}
                        </span>
                                    </div>
                                    </div>
                            </li>

        </ul>
    </div>
</div>
