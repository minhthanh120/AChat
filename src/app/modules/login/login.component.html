<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#3390ec] via-[#2481e0] to-[#1976d2] p-4">
  <div class="w-full max-w-md">
    <!-- Logo/Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-full mb-4 shadow-lg">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3390ec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2">Welcome to AChat</h1>
      <p class="text-white/90">Sign in to continue</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <!-- Social Login Buttons -->
      <div class="mb-6">
        <p class="text-center text-sm text-[#707579] mb-4">Sign in with</p>
        <div class="flex flex-col gap-3">
          <button 
            type="button"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-[#3b5998] text-white rounded-xl hover:bg-[#365899] transition-colors font-medium">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
            Continue with Facebook
          </button>
          <button 
            type="button"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-[#24292F] text-white rounded-xl hover:bg-[#1a1d21] transition-colors font-medium">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            Continue with GitHub
          </button>
          <button 
            type="button"
            class="w-full flex items-center justify-center gap-3 px-4 py-3 border-2 border-[#e4e6ea] text-[#000000] rounded-xl hover:bg-[#f0f2f5] transition-colors font-medium">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </div>

      <!-- Divider -->
      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#e4e6ea]"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-4 bg-white text-[#707579]">or</span>
        </div>
      </div>

      <!-- Login Form -->
      <form [formGroup]="user" (ngSubmit)="login(user.value)">
        <div class="mb-5">
          <label for="email" class="block mb-2 text-sm font-medium text-[#000000]">Email</label>
          <input 
            id="email" 
            type="email" 
            formControlName="email"
            class="w-full px-4 py-3 bg-[#f0f2f5] border-0 rounded-xl text-[15px] focus:bg-white focus:ring-2 focus:ring-[#3390ec] focus:outline-none transition-all"
            placeholder="Enter your email">
        </div>

        <div class="mb-6">
          <label for="password" class="block mb-2 text-sm font-medium text-[#000000]">Password</label>
          <input 
            id="password" 
            type="password" 
            formControlName="password"
            class="w-full px-4 py-3 bg-[#f0f2f5] border-0 rounded-xl text-[15px] focus:bg-white focus:ring-2 focus:ring-[#3390ec] focus:outline-none transition-all"
            placeholder="Enter your password">
        </div>

        <!-- Error Message -->
        <p *ngIf="error" class="mb-4 text-sm text-red-500 text-center">{{ error }}</p>

        <!-- Spinner -->
        <div *ngIf="spinnerService.visibility | async" class="flex justify-center mb-4">
          <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#3390ec]"></div>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit"
          class="w-full py-3 bg-[#3390ec] text-white rounded-xl hover:bg-[#2481e0] transition-colors font-medium text-[15px] shadow-md">
          Sign In
        </button>
      </form>

      <!-- Footer Links -->
      <div class="mt-6 text-center space-y-2">
        <a href="#" class="block text-sm text-[#3390ec] hover:underline">Forgot password?</a>
        <p class="text-sm text-[#707579]">
          Don't have an account? 
          <a href="/register" class="text-[#3390ec] hover:underline font-medium">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
